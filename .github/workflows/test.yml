name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest tests/test_scheduler.py -v

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/test_parity.py -v

  e2e:
    runs-on: ubuntu-latest
    env:
      MODEL_NAME: HuggingFaceTB/SmolLM-135M
      TORCH_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt httpx
      - name: boot cluster
        run: docker compose up -d --build coordinator worker-1 worker-2 worker-3
      - name: wait for coordinator + workers
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8000/api/health > /dev/null; then
              active=$(curl -s http://localhost:8000/api/workers | python -c "import sys,json; print(json.load(sys.stdin)['stats']['workers_active'])")
              if [ "$active" -ge 3 ]; then echo "ready with $active workers"; exit 0; fi
              echo "coordinator up; workers_active=$active, waiting..."
            else
              echo "coordinator not ready yet ($i)"
            fi
            sleep 5
          done
          docker compose logs
          exit 1
      - name: run e2e parity
        env:
          COORDINATOR_URL: http://localhost:8000
        run: pytest tests/test_e2e.py -v
      - name: dump logs on failure
        if: failure()
        run: docker compose logs
